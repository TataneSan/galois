name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Rust tests
        run: cargo test --quiet

      - name: Validate docs examples
        run: python3 test_docs.py
